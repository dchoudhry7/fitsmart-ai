<!DOCTYPE html>
<html>
<head>
    <title>FitSmart AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <form action="/predict" method="post" class="card p-5 shadow-lg" style="width: 500px;">

        <h2 class="text-center mb-4">🔥 Fitness Predictor</h2>

        <select name="gender" class="form-control mb-3">
            <option value="0">Male</option>
            <option value="1">Female</option>
        </select>

        <input type="number" name="age" placeholder="Age" class="form-control mb-3" required>
        <input type="number" name="height" placeholder="Height (cm)" class="form-control mb-3" required>
        <input type="number" name="weight" placeholder="Weight (kg)" class="form-control mb-3" required>

        <input type="number" name="duration" placeholder="Workout Duration (min)" class="form-control mb-3" required>
        <input type="number" name="heart_rate" placeholder="Heart Rate" class="form-control mb-3" required>
        <input type="number" step="0.1" name="body_temp" placeholder="Body Temp" class="form-control mb-4" required>

        <button class="btn btn-primary w-100">🚀 Predict Calories</button>

    </form>

</div>

</body>
</html>
