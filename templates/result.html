<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="card p-5 text-center shadow-lg" style="width: 500px;">

        <h2 class="mb-3">🔥 Your Results</h2>

        <h1 class="text-warning">{{ calories }}</h1>
        <p>Calories Burned</p>

        <hr>

        <h4>BMI: {{ bmi }}</h4>
        <h5>{{ status }}</h5>

        <p class="mt-2">{{ advice }}</p>

        <div class="d-flex justify-content-center mt-4">
            <img src="{{ url_for('static', filename='graph.png') }}"
                 class="rounded"
                 style="width: 300px;">
        </div>

        <a href="/" class="btn btn-light mt-4">Go Back</a>

    </div>

</div>

</body>
</html>
